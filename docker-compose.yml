version: "3.9"

services:
  # ── PostgreSQL + pgvector ────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: bidv_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bidv_agent
      POSTGRES_USER: bidv
      POSTGRES_PASSWORD: bidv_secret
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidv -d bidv_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bidv_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://bidv:bidv_secret@db:5432/bidv_agent
      DATABASE_URL_SYNC: postgresql://bidv:bidv_secret@db:5432/bidv_agent
      OPENAI_API_KEY: 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
      PYTHONUNBUFFERED: "1"
      LANGCHAIN_TRACING_V2: "true"
      LANGCHAIN_API_KEY: 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  # key vừa copy
      LANGCHAIN_PROJECT: "bidv-agent"             # tên project trên LangSmith
      LANGCHAIN_ENDPOINT: "https://api.smith.langchain.com"
      # OPENAI_API_KEY: "${OPENAI_API_KEY}"  
    volumes:
      - ./backend:/app
      - template_files:/app/templates_store
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Nginx (serves frontend + proxies /api to backend) ───────────────────
  nginx:
    image: nginx:alpine
    container_name: bidv_nginx
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: bidv_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db


volumes:
  pg_data:
  template_files:
